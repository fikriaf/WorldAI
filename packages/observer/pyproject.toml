[project]
name = "world-ai-observer"
version = "0.1.0"
description = "World.ai LLM Observer Layer (OpenRouter)"
requires-python = ">=3.12"
dependencies = [
    "openai>=1.12",
    "celery>=5.3",
    "redis>=5.0",
    "qdrant-client>=1.7",
    "pydantic>=2.5",
    "tenacity>=8.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src.observer"]